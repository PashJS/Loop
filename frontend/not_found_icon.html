<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="screenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.06"/>
      <stop offset="1" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- TV frame (crisp, rounded, consistent stroke) -->
  <rect x="44" y="88" width="312" height="224" rx="36" stroke="white" stroke-width="10" stroke-linejoin="round" fill="none"/>

  <!-- Screen (subtle glass gradient, inset border) -->
  <rect x="66" y="110" width="268" height="180" rx="28" fill="url(#screenG)" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Modern "not found" mark: subtle ring + geometric glyph (text for crispness) -->
  <circle cx="200" cy="200" r="44" stroke="white" stroke-width="6" opacity="0.12" fill="none"/>
  <text x="200" y="206" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, Roboto, Arial, sans-serif" font-weight="700" font-size="56" fill="white">?</text>

  <!-- Minimal, flat stand -->
  <rect x="140" y="318" width="120" height="10" rx="5" fill="white" opacity="0.12"/>

  <!-- fine top bevel to separate bezel from screen (tiny, geometric) -->
  <rect x="66" y="110" width="268" height="4" rx="2" fill="white" opacity="0.02"/>
</svg>
